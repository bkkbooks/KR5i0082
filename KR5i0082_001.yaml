front:
  text: 擊壤集重刋道藏輯要
  hash: sha256:13b8abf3aa3bab080f202aa7776a4c78ebc9ce67ffa74d307730e58cb01c71b2
  markers:
  - {type: page-break, offset: 3, content: '', id: CK-BS_KR5i0082_01p001a}
body:
  text: 擊壤集康節先生邵雍著閑吟四首錄一欲有一瓢樂曾無二頃田丹誠未貫日白髮已華顚雲意寒尤淡松心老益堅年來疎懶甚時憶舊林泉題留侯廟滅項興劉如覆手絕秦昌漢若更棊卷舒天下坐籌日鍛鍊心源辟穀時黃石公傳皆是用赤松子伴更何爲如君才業求其比今古相望不記誰春遊五首錄三五嶺梅花迎臘開三川正月賞寒梅相去萬里一先一月始知春色從南來何人妙曲傳羌笛盡日清香落酒杯料得天涯未歸客也應臨此重徘徊洛城春色浩無涯春色城東又復嘉風力緩摇千樹柳水光輕蕩半川花煙晴翡翠飛平岸日暖鴛鴦下淺沙不見君王西幸久遊人但感鬢空華人間佳節唯寒食天下名園重洛陽金谷暖橫宮殿碧銅駝晴合綺羅光橋邊楊柳細垂地花外鞦韆半出牆白馬蹄輕草如翦爛遊於此十年强秋遊六首錄四七月芙蕖正爛開東南園近日徘徊有時風向池心過無限香從水面來罨畫溪深方誤入洞庭湖晚未成廻坐來一霎蕭蕭雨又送新涼到酒杯先秋顥氣已潛生洛邑方知節候平庭院乍涼人共喜園林經雨氣尤淸廻舟伊水風微溜緩轡天津月正明自有皋𧃍分聖念好將詩酒樂升平家住城南水竹涯乘秋行樂未嘗虧輕寒氣候我自愛半醉光陰人莫知信馬天街微雨後凭欄僧閣晚晴時十年美景追尋徧好向風前請白髭霜天寥落思無窮不奈樓高逼望中四面遠山徒滿目九秋宮殿自危空雲橫遠嶠千尋直霞亂斜陽數縷紅無限傷情言不到共誰開口向西風和商守西樓雪霽大雪初晴日半曛高樓何惜上仍頻數峰𡷾崒劎鋩立一水縈紆氷縷新崑嶺移歸都是玉天河落後盡成銀幽人自恨無佳句景物從來不負人和商守雪殘登樓殘雪已消冰已開風光漸覺擁樓臺旅人未遂日邊去春色又從天上來况是罇中常有酒豈堪嶺上却無梅若非太守金蘭契誰肯傾心重不才和商守雪霽登樓百尺危樓小雪晴晚來閑望逼人淸山橫暮靄高還下水隔疎林淡復明天際落霞千萬縷風餘殘角兩三聲此時此景眞堪畫只恐丹青筆未精追和王常侍登郡樓望山四賢當日此盤桓千百年人尙厚顏天下有名難避世胸中無物漫居山事觀今古興亡後道在君臣進退間若藴奇才必奇用不然須負一生閑賀人致政人情大率喜爲官達士何嘗有所牽解印本非嫌祿簿掛冠殊不爲高年因通物性興衰理遂悟天心用捨權宜放襟懷在淸景吾鄕况有好林泉晨起山高水復深無計奈如今地盡一時事天開萬古心輕煙籠曉閣微雨散青林此景雖平淡人間何處尋龍門道中作物理人情自可明何嘗慼慼向平生卷舒在我有成算用捨隨時無定名滿目雲山俱是樂一毫榮辱不須驚侯門見說深如海三十年來掉臂行宿延秋庄驅車入洛川下馬弄飛泉乍有雲山樂殊無朝市喧非惟快心志自可忘形言借問塵中友誰爲得手先燕堂卽事川上數峰青林間一水明閑雲無定體幽鳥不知名遊侣旣非約歸期莫計程錙銖人世事休强作威𤢆上寺看南山是峰巒西連梁雍寛與其行裏看不若坐中觀包括經唐漢并吞厯晉韓消沈事難問唯爾尙巑岏女几祠西南有高山山在杳冥間神仙不可見滿目空雲煙千年女几祠門臨洛水邊但聞霓裳曲世人猶或傳燕堂閑坐天網疎難漏世網宻莫通我心久不動一脫二網中高竹潄淸泉長松迎淸風又云瀟灑松間月淸冷竹外風此時逢此景正與此心同牧童隨行笠與蓑未始散天和暖戲荒城側寒偎古塚阿數聲牛背笛一曲隴頭歌應是無心問朝廷事若何夢中吟三鄕道中作夢中說夢猶能憶夢覺夢中還又隔今日恩光空喜歡當年意愛難尋覔水成流處豈無聲花到謝時安有色過此相逢陌路人都如元未曾相識秋懷三十六首錄十七七月夜初長星斗爭煌煌庭除經小雨枕簟生微涼照物無遁形虛鑑自有光照事無遁情虛心自有堂晴牕日初曛幽庭雨乍洗紅蘭靜自披綠竹閑相倚榮利若浮雲情懷淡如水身非天外人意從天外起明月生海心涼風起天末物象自呈露襟懷驟披豁悟盡周孔權解開仁義結禮法本防姦豈爲吾曹設疎雨滴高梧微風挼弱柳此景𡻕𡻕同世人自白首俗慮易縈仍塵襟難抖擻浮生已夢中其間强爲有國命在乎民民命在乎食聖人雖復生斯言固不易虛惠豈足尙教人以姑息虛名豈足高教人以緣飾清風無人兼自可入吾手明月無人并自可入吾牖中心旣已平外物何嘗誘餘事豈足論但恐罇無酒淡煙疎林輕風裊寒雨日暮人已歸羣雞猶啄黍此心固不動此事極難處一言以蔽之尙恐費言語八月炎涼均氣味亦自好臨虛喬木低遠望行人小有跡事皆妄無心物都了何須更問辛願君自食蓼秋色日漸深老心日益懶倦卽下階行閑來弄書卷廣陌多風塵見說難閉眼侯門已是深帝閽又復遠塞鴻猶未來梁燕已辭去雲山千萬重相逢在何處岌嶪都城門繚遶長亭路風土敗人衣纔新又成故斷續蟬聲外稀疎雁下前年光空去也人事益蕭然洗竹留新笋翻書得舊編誰知養心者肯與世爭權中秋光景好中州煙水奇天重初寒候人便半醉時榻緣明月掃襟待好風吹一點胸中事人間都不知良月滿高樓高樓仍中秋午夜冷露下千里寒光流何人將此鑑拂拭新磨休照破萬古心白盡萬古頭人老秋更老山深水復深高木已就脫慧禽空好音筋骸非曩日道德負初心賴有餘編在時時尙可尋九月氣乍肅衰柳猶有蟬霜外疎鐘斷風餘淸籟傳千山亂遠目一鶚摩高天自非出世人而敢危行言水寒潭見心木落山露骨始信天無涯萬里不隔物脫衣掛扶桑引手探月窟不負仁義心區區五十一萬里晴天外一片霜上月長松挺青葱羣卉入消歇有齒日益衰有髮日益脫獲罪固已多此心難屑屑放言旣得希夷樂曾無寵辱驚泥空終是著齊物到頭爭忽忽閑拈筆時時自冩名誰能苦眞性情外更生情小圃逢春隨分亭欄亦弄研不妨閑傍酒壚邊夜簷靜透花間月晝戸寒生竹外煙事到悟來全偶爾天教閑去豈徒然壺中日月長多少濫占風光二十年惜芳菲細算人間千萬事皆輸花底共開顏芳菲大率一春内爛漫都無十日間亦恐憂愁爲齟齬更防風雨作艱難莫教此後成遺恨把火罇前尙可攀弄筆行年五十二老去復何憂事貴照至底話難言到頭上有明天子下有賢諸侯飽食高眠外自餘無所求答人書意仲尼言正性子輿言踐形二者能自得殆不爲虛生所交若以道所感若以誠雖三軍在前而莫之得凌答人書卿相一𡻕俸寒儒一生費人爵固不同天爵何嘗匱不有霜與雪安知松與桂雖無官自高豈無道自貴與人話舊耳目所聞見且言三十春纔更十次閏已換一番人圯族綺紈故朱門車馬新從來皆偶爾何者謂功勳閑吟忽忽閑拈筆時時樂性靈何嘗無對景未始便忘情句會飄然得詩因偶爾成天機難狀處一點自分明天津幽居予家洛城裏况復在天津日近先知曉天低易得春時光優化國景物厚幽人自可辭軒冕閑中老此身誠明吟孔子生知非假習孟軻先覺亦須修誠明本屬吾家事自是今人好外求繩水吟有水善平難善直唯繩能直不能平如將繩水合爲一世上何憂事不明重遊洛川買石尙饒雲買山當從水雲可致無心水能爲鑑止性以無心明情由鑑止已二者不可失出彼而入此何事吟寄三城富相公何事教人用意深出塵些子索沈吟施爲欲似千鈞弩磨礪當如百鍊金釣水誤持生殺柄著棋閒動戰爭心一杯酒美聊康濟林下時時或自斟登嵩頂九州環遶若棋枰萬𡻕崇高看太平四海有人能統御中原何復有交爭長憂眼見奸雄輩且願身爲堯舜氓五十三年蕪沒事如今方喜看春耕和祖龍圖見寄吾家職分是雲山不見雲山不解顏遊興亦難拘日限夢魂都不到人間煙嵐欲極無涯樂軒冕何嘗有暫閒洛社交朋屢思約幾時曾得略躋攀自况三首名利場中難著脚林泉路上早廻頭不然半百殘軀體正被風波汨未休滿天風月爲官守遍地河山是事權唯我敢開無意口對人高道不妨言每恨性昏聞道晚長慚智短適時難人生三萬六千日二萬日來身却閒治平丁未仲秋遊伊洛二川六日晚出洛城西門宿奉親僧舍聽張道人彈琴向晚驅車出上陽初程便宿水雲鄉更聞數弄神仙曲始信壺中日月長九口登夀安縣錦幈山下宿邑中煙嵐一簇特崔嵬到此令人心自灰上有神仙不知姓洞門閑倚白雲開依韻和夀安尹尉有寄不向紅塵浪著鞭殊無才業合時賢本酬壯志都無效欲住靑山却有緣翠竹陰中開縹帙白雲堆裏揖飛泉錦幈正與南溪對他日從遊之子傳十三日遊上寺在縣北及黃澗在縣西能休塵境爲眞境未了僧家是俗家不向此中尋洞府更於何處覔藏花十六日依韻酬福昌令有寄道義相歡豈易親古稱難處是知人文章不結市朝士榮辱非關雲水身話入精詳皆物理言無形跡盡天眞他時洛社過從輩圖牒中添又一鄰十九日歸洛城路遊龍門伊川往復過龍山每過龍山意且閒莫道移人不由境可堪深著利名間留題龍門融結成來不記秋斷崖蒼壁鎖煙愁中分洪造夏王力橫截大山伊水流八節灘聲長在耳一川風景盡歸樓行人莫動凭欄興無限英雄浪白頭龍門石樓看伊川數朝從欵走煙霞縱意凭欄看物華百尺樓高通鳥道一川煙水屬僧家直須心逸方爲樂始信官榮未足誇此景得遊無事日也宜知幸福無涯二十五日依韻和左藏吳傳正寺丞見贈上陽光景好看書非象之中有坦途良月引歸芳草渡快風飛過洞庭湖不因赤水時時往焉有黃芽日日娛莫道天津便無事也須閒處著功夫來詩云從此天津南畔景不教都屬邵堯夫故有是句代書寄劎州普安令周士彥屯田作官休用歎奚爲未有升高不自卑君子屈伸方爲道吾儒進退貴從宜卽今彭澤歸何地他日東門去未遲痛恨伊嵩景無限一名佳處重來資和魏教授見贈淸世文章日月懸無才唯幸樂豊年遊山太室更少室看水伊川又洛川古有孟軻難語覺時無顏子易爲賢讀書每到天根處長懼諸公問極玄和吳冲卿省副見贈非有非無是祖鄕都來相去一毫芒人人可到我未到物物不妨誰與妨失卽肝脾爲楚越得之藜藿是膏梁一言千古難知處妙用仍須看呂梁傷心行不知何鐵打成針一打成針只剌心料得人心不過寸剌時須剌十分深依韻和王不疑少卿見贈不把憂愁累物華光陰過眼疾如車以平爲樂忝知分待足求安恐未涯食罷有時尋蕙圃睡餘無事訪僧家天津風月勝他處長是思君共煮茶仁者吟仁者難尋思有常平居愼勿恃無傷爭先徑路機關惡退後語言滋味長爽口物多須作疾快心事過必爲殃與其病後能求藥不若病前能自防思山吟祗恐身閒心未閒心閒何必住雲山果然得手情性上更肯埋頭利害間動止未嘗防忌諱語言何復著機關不圖爲樂至于此天馬無蹤自往還依韻和劉職方見贈造物工夫意自深從吾所樂是山林少因多病不干祿老爲無才難動心花月靜時行水際蕙風香處卧松陰閒牕一覺從容睡願當封侯與賜金崇德閣下答諸公不語禪浩浩長空走日輪何須苦苦辨根塵鵬程萬里非由駕鶴算三千别有春鉛錫點金終屬假丹青畫馬妄求眞請觀風急天寒夜誰是當門定脚人代書寄長安幕張文通無學又無謨胸中一向虛枯腸忻飲酒病眼怕看書洛浦輕風裏天津小雨餘故人千里隔相望意何如先幾吟先幾能識是吾儕愼勿輕爲世俗咍把似眾中呈醜拙爭如靜裏且詼諧奇花萬狀皆輸眼明月一輪長入懷似此光陰豈虛過也知快活作人來風吹木葉吟熙甯三年風吹木葉不吹根愼勿將根苦自陳天子舊都閒好住聖人餘事冗休論長年國裏神仙侣安樂窩中富貴人萬水千山行己遍歸來認得自家身閒行吟長憶當年掃獘廬未嘗三徑草荒蕪欲爲天下屠龍手肯讀人間非聖書否泰悟來知進退乾坤見了識親疎自從會得環中意閒氣胸中一點無投吳走越覔靑天殊不知天在眼前開眼見時猶有病舉頭尋處更無緣顏淵正在如愚日孟子方當不動年安得功夫遊寶肆愛人珠貝重憂錢買卜稽疑是買疑病深何藥可能醫夢中說夢重重妄牀上安牀疊疊非列子御風徒一本作猶有待夸夫逐日豈無疲勞多未有收功處踏盡人間閒路歧逍遥吟吾道本來平人多不肯行得心無厚味失脚有深坑若未通天地焉能了死生向其間一事須是自誠明人生憂不足足外更何求吾生雖未足亦也却無憂天和將酒養眞樂有詩勾不信年光會催人早白頭夜入安樂窩晨興飲太和窮神知道泰養素得天多日月任推盪山川徒琢磨欲求爲此者到了是誰何何事感人深求之無處尋兩儀長在手萬化不關心石裏時藏玉砂中屢得金分明難理會須索入沈吟放小魚纎鮮不足留此失一生休放爾江湖去寛渠鼎鑊遊更宜深避網愼勿悞吞鈎天下多庖者無令落庶羞再和王不疑少卿見贈乍涼天氣好何處不堪遊鴻雁來賓日鷹鸇得志秋忘形終夕樂失脚一生休多少江湖上舟船未到頭重九日登石閣三首錄一事出一時間時過事莫還當時深可愛過後不堪看夏去休言暑冬來始講寒人能知此理憂患自難千和王安之少卿同遊龍門生平有癖好尋幽一𡻕龍山四五遊或往或還都不計蓋無榮利可稽留數朝從欵看伊流夜卜香山宿石樓會有涼風開遠意更和煙雨弄高秋𡻕暮自貽當年志意欲橫秋今日思之重可羞事到强圖皆屑屑道非眞得盡悠悠靜中照物精難隱老後看書味轉優談塵從容對賓客薦章重疊誤公侯已䝉賢傑開靑眼不顧妻孥怨白頭谷口鄭眞焉敢望夀陵餘子若爲謀鼎間龍虎望看守棊上山河廢講求一枕晴牕睡初覺數聲幽鳥語方休林泉好處將詩買風月佳時用酒酬三百六旬如去箭肯教襟抱落閒愁寄毫州秦伯鎭兵部天心復處是無心心到無時無處尋若謂無心便無事水中何故却生金酒涵花影滿卮紅瀉人天和胸臆中最愛一般情味好半醺時與太初同獨賞牡丹賞花全易識花難善識花人獨倚欄雨露功中觀造化神仙品裏定容顏尋常只可言時尙奇絕方名出世間賦分也須知不淺算來消得一生閒安樂窩中自貽物如善得終爲美事到巧圖安有公不作風波於世上自無冰炭到胸中災殃秋葉霜前墜富貴春華雨後紅造化分明人莫會枯榮消得幾何功書皇極經世後樸散人道立法始乎犧皇𡻕月易遷革書傳難考詳二帝啟禪讓三王正紀綱五伯仗形勝七國爭强梁兩漢驤龍鳳三分走虎狼西晉擅風流羣凶來北荒東晉事淸芬傳馨宋齊梁逮陳不足算江表成悲傷後魏乘晉獘掃除幾小康遷洛未甚久旋聞東西將北齊舉爝火後周馳星光隋能一統之駕福于巨唐五代如傳舍天下徒擾擾不有眞主出何由奠中央一萬里區宇四千年興亡五百主肇位七十國開彊或混同六合或控制一方或創業先後或垂祚短長或奮于將墜或奪于已昌或災興無妄或福會不祥或患生藩屏或難起蕭牆或病由唇齒或疾亟膏肓談笑萌事端酒食開戰場情慾之一發利害之相戕劇力恣吞噬無涯罹禍殃山川纔表裏邱壠又荒涼荊棘除難盡芝蘭種未芳龍蛇走平地玉石粹崑岡善設稱周孔能齊是老莊奈何言已病安得意都忘思鄭州陳知默因感其化去不得一識面美物須絕代異人須不世造化得生成諒亦非容易曠世耳可聞同時目能視陳子同時人奈何聞諸耳小車行喜醉豈無千日酒惜春還有四時花小車行處人歡喜滿洛城中都似家垂柳門前垂柳正依依更被東風來往吹忘了自家今已老却疑自是少年時至靈吟至靈之謂人至貴之謂君明則有日月幽則有鬼神生平與人交生平與人交未始有甘壞已亦無負人人亦無我害知識吟目見之謂識耳聞之謂知奈何知與識天下亦常稀仁聖吟盡道之謂聖如天之謂仁如何仁與聖天下莫敢倫擊壤吟人言别有洞中仙洞裏神仙恐妄傳若俟靈丹須九轉必求原缺頂更千年長年國裏花千樹安樂窩中樂滿懸有樂有花仍有酒却疑身是洞中仙林下吟五首錄二眞工造化豈容私拙者爲謀亦甚微安樂窩深初起後太和湯釅半醺時長年國裏籃舁往永熟鄉中杖策歸身似升平無一事數莖髭白任風吹老年軀體索温存安樂窩中別有春萬事去心閒偃仰四支由我任舒伸庭花盛處涼鋪簟簷雪飛時軟布裀誰道仙翁拙於用也能康濟自家身有物輕醕號太和半醺中最得春多靈丹換骨還如否白日升天得似麽儘快意時仍起舞到忘言處只謳歌賓朋莫怪無拘檢眞樂攻心不奈何安樂窩中自訟吟不向紅塵浪著鞭唯求寡過尙無緣虛更蘧瑗知非日謬厯宣尼讀易年髮到白時難受彩心歸通後更何言至陽之氣方爲玉猶恐鑽磨未甚堅林下局事吟閒人亦也有官守官守一身四事有一事承曉露看花一事迎晚風觀柳一事對皓月吟詩一事留嘉賓飲酒從事于茲二十年欲求同列誰能否謝甯寺丞惠希夷罇仙掌峰巒峭不收希夷陳圖南也去後遂無儔能斟時事高擡手善酌人情畧撥頭畫虎不成心尙在悲麟無應淚橫流悟來不必多言語贏得淸閑第一籌和君實端明花菴獨坐靜坐養天和其來所得多耽耽同又作殊厦宇密密引藤蘿忘去貴臣度能容野客過繫時休戚重終不道如何和君實端明見贈曾不見譊譊城中類遠郊雖無千里馬却有一枝巢月出雲山背風來松竹梢頑然何所得豈復避人嘲秋夜浮雲一消散星斗粲長天碧蘚墜丹果淸香生白蓮體涼猶衣葛耳靜已無蟬坐久羣動息秋空唯寂然雲晴空碧於水那得片雲飛映日成丹鳳隨風變白衣去來皆絕迹隱顯兩忘機天理隨能測終然何所歸和雲萬里幙四垂一片雲自飛祗知根抱石不爲天爲衣旣來曾無心却去甯有機未能作霖雨安用帝鄕歸秋日登石閣初晴僧閣一凭欄風物淒涼八月間欲盡上層嘗脚力更於高處看人寰秋深天氣隨宜好老後心懷只愛閑爲報遠山休歛黛這般情意久闌珊風月吟涼風無限淸良月無限明淸明不我捨長能成歡情終朝三褫辱晝日三接榮榮辱不我預何復能有驚贈富公天下繫休戚世間誰擬倫三朝爲宰相四水作閑人照破萬古事收歸一點眞不知緣底事見我却慇慇誡子吟善惡無他在所存小人君子此中分攺圖不害爲君子迷復終歸作小人良藥有功方利病白珪無玷始稱珍欲成令器須追琢過失如何不就新自古吟自古大聖人猶以爲難事而况後世人豈復便能至求之不勝難得之至容易千人萬人心一人之心是寒夜吟天加一倍寒我添一重被不出旣往言不爲已甚事責已重以周與人不求備唯是大聖人能立無過地事急吟旱急望雨意病危思藥心人人當此際不待勸而深知人吟事到急時觀態度人于危處露肝脾深心厚貎平時可愼勿便言容易知思患吟緣飾近虛襟虛襟後患深療飢當用食救旱必須霖和君實端明養道自安恬霜毛一任添且無官責咎幸免世猜嫌蓬戸能安分藜羹固不饜一般偏好處曝背向前簷謝富相公見示新詩一軸通衢選地半松筠元老辭榮向盛辰多種好花觀物體每斟醇酒發天眞淸朝將相當年事碧洞神仙今日身更出新詩二十首其間字字敵陽春文章天下稱公器詩在文章更不疎到性始知眞氣味入神方見妙工夫閑將𡻕月觀消長靜把乾坤照有無辭比離騷更温潤離騷其奈少寛舒和君實端明登石閣平地雖然遠那知物物新危樓一百尺別有萬般春六十三吟行年六十有三𡻕齒髮雖衰志未衰恥把精神虛作弄肯將才力妄施爲愁聞刮骨聲音切悶見吹毛智數卑珍重至人嘗有語失便宜是得便宜陳希夷先生嘗有是言太和湯吟二味相和就甕頭一般收口效偏優同斟衹却因無事獨酌何嘗爲有愁纔沃便從眞宰辟半醺仍約伏羲遊人間盡愛醉時好未到醉時誰肯休天意吟天意無他只自然自然之外更無天不欺誰怕居暗室絕利須求在一源未喫力時猶有說到收功處更何言聖人能事人難繼無價明珠正在淵三惑老而不歇是一惑安而不樂是二惑閑而不淸是三惑三者之惑是戕賊四喜一喜長年爲夀域二喜豐年爲樂國三喜淸閑爲福德四喜安康爲福力一室吟一室可容身四時長有春何嘗無美酒未始絕佳賓洞裏賞花者君貺也宅中有洞天邊泛月人君貺也宅中有樓相逢應有語笑我太因循兩𡻕錦幈之遊不克見鄭令因以寄之𡻕𡻕羣芳正爛開錦幈山下賞春來兩年不得陪仙躅洞裏仙人出未回安樂窩中吟安樂窩中事事無唯存一卷伏羲書倦時就枕不必睡忺後攜笻任所趨准備點茶收露水隄防合藥種魚蘇苟非先聖開䝉吝幾作人間淺丈夫安樂窩中弄舊編舊編將絕又重聯燈前燭下三千日水畔花間二十年有主山河難占籍無爭風月任收權閑吟閒咏人休問此箇工夫世不傳安樂窩中萬戸侯良辰美景忍虛休已曾得手春深日更欲放懷年老頭曉露重時花滿檻暖醅浮處酒盈甌聖人喫緊些兒事又省工夫又省憂安樂窩中甚不貧中間有榻可容身儒風一變至於道和氣四時長若春日月作明明主日人言成信信由人唯人與日不相遠過此何嘗更語眞省事吟慮少夢自少言稀過亦稀簾垂知日永柳靜覺風微但見花開謝不聞人是非何須尋洞府度𡻕也應遲舉世吟舉世自紛紛誰爲無事人吾生獨何幸卧看洛陽春箋年老逢春詩年老逢春春莫疑箋云物理窺開後人情照破時且無形不見只有意能知老年纔會惜芳菲箋云一𡻕正榮處三春特盛時是花堪愛惜况見好花枝自知一賞有分付箋云羣卉爭妍處奇花獨異時東君深意思亦恐要人知誰讓千金無孑遺箋云白日偏催處黃金欲盡時侈心都用了始得一開眉美酒飮教微醉後箋云瓮頭噴液處盞面起花時有客來相訪通名曰伏羲好花放到半開時箋云風輕如笑處露重似啼時只向笑啼處濃香惹滿衣這般意思難名狀箋云陰陽初感處天地未分時言語旣難到丹青何處施只恐人間都未知箋云酒到醺酣處花當爛熳時醺酣歸酩酊爛熳入離披謝君實端明用只將花卉記冬春有時自問自家身莫是羲皇已上人日往月來都不記只將花卉記冬春大字吟詩成半醉正陶陶更用如椽大筆抄儘得意時仍放手到凝情處畧濡毫魯陽𨚫日功猶淺宗慤乘風志未高寫出太平難狀意任他天下頌功勞教子吟爲人能了自家身千萬人中有一人雖用知如未知說在乎行與不行分該通始謂才中秀傑出方名席上珍善惡一何相去遠也由資性也由勤世上吟世上偷閑始得閑我生長在不忙間光陰有限同歸老風月無涯可慰顏坐卧遶身唯水竹登臨滿目但雲山醉眠只就花陰下轉破花陰夢始還旋風吟二首安有太平人不平人心平處固無爭棋中機械不願看琴裏語言時喜聽少日掛心唯帝典老年留意只羲經自知别得收功處松桂隆冬始見青松桂隆冬始見青蒿萊盛夏亦能榮光陰去後繩難繫利害在前人必爭萬事莫於疑處動一身常向吉中行人心相去無多遠安有太平人不平覽照吟淩晨覽照見皤然自喜皤然一叟仙慷慨敢開天下口分明高道世間言雖然天下本無事不奈世間長有賢自問此身何所用此身唯稱老林泉自在吟心不過一寸兩手何拘拘身不過數尺兩足何區區何人不飲酒何人不讀書奈何天地間自在獨堯夫心安吟心安身自安身安室自寛心與身俱安何事能相干誰謂一身小其安若泰山誰謂一室小寛如天地間爲善吟人之爲善事善事義當爲金石猶能動鬼神其可欺事須安義命言必道肝脾莫問身之外人知與不知偶得吟日爲萬象精人爲萬物靈萬象與萬物由天然後生言由人而信月由日而明由人與由日何嘗不太平男子吟欲作一男子須了四般事財能使人貪色能使人嗜名能使人矜勢能使人倚四患旣都去豈在塵埃裏待物吟待物莫如誠誠眞天下行物情無遠近天道自分明義理須宜顧才能不用矜世間閑緣飾到了是虛名無事吟人間萬事若磨持叢入枯榮利害機祗有一般無對處都如天地未分時淸夜吟月到天心處風來水面時一般淸意味料得少人知安分吟安分身無辱知幾心自閑雖居人世上𨚫是出人間可必吟可必人間唯善事不由天地只由衷莫嫌效遠因而止更勉其來更有功恍惚吟恍惚陰陽初變化氤氲天地乍廻旋中間些子好光景安得工夫入語言謝君實端明詩人說崑崙多美玉世傳滄海有明珠世傳人說恐無據今我家藏乃不虛天聽吟天聽寂無音蒼蒼何處尋非高亦非遠都只在人心天意吟人能言語自能窺天意無言人莫欺莫道無言便無事殆非流俗所能知小車行自從三度絕韋編不讀書來十二年大𤮕子中消白日小車兒上看靑天閑爲水竹雲山主靜得風花雪月權俯仰之間俱是樂任他人道似神仙晚步吟晚步上陽堤手攜笻竹枝靜隨芳草去閑逐野雲歸月出松梢處風來蘋末時林間此光景能有幾人知接花吟物爲萬民生人爲萬物靈人非物不活物代人而興男女天所生夫妻人所成天人相與外率是皆虛名觀陳希夷先生眞及墨跡未見希夷眞未見希夷蹟止聞希夷名希夷心未識及見希夷蹟又見希夷眞始知今與古天下長有人希夷眞可觀希夷墨可傳希夷心一片不可得而言歡喜吟日往月來終則有始半行天上半下地底照臨之間不憂則喜予何人哉歡喜不已自作眞贊松桂操行鸎花文才江山氣度風月情懷借爾面貎假爾形骸弄丸餘暇閑往閑來丸謂太極秋閣吟秋閣一凭欄人心何悄然乾坤今𡻕月唐漢舊山川澹泊霜前日蕭疎雨後天丹靑空妙手此意有誰傳力外吟以少爲多以無爲有力外周旋不能長久謝傅欽之學士見訪長莫長於天大莫大於地天地尙有極自餘安足計世態非一朝人情止於是以至立殊功無非借巨勢適會在其間愼勿强生事雖嚴似雪霜無攺如松桂方惜久離濶𨚫喜由道義相别二十年猶能記憔悴答傳欽之欽之謂我曰詩欲多吟不如少吟詩欲少吟不如不吟我謂欽之曰亦不多吟亦不少吟亦不不吟亦不必吟芝蘭在室不能無臭金石振地不能無聲惡則哀之哀而不傷善則樂之樂而不淫月陂閑步因隨芳草行來遠爲愛淸波歸去遲獨步獨吟仍獨坐初涼天氣水寒時謝圓益上人惠詩一卷覽公詩十首起我意何多似藥驅疑疾如茶滌睡魔月當松皎潔山隔水嵯峨明日如無事天津可再過自述二首錄一何者堪名席上珍都緣當日得師眞是知佚我無如老惟喜放懷長似春得志當爲天下事退居聊作水雲身胸中一點分明處不負高天不負人天津獘居䝉諸公共爲成買作詩以謝重謝諸公爲買園買園城裏占林泉七千來步平流水二十餘家爭出錢嘉祐卜居終是僦熙甯受劵遂能專鳳凰樓下新閑客道德坊中舊散仙洛浦淸風朝滿袖嵩岑皓月夜盈軒接籬倒載芰荷畔談塵輕摇楊柳邊陌徹銅駝花爛熳堤連金谷草芋綿青春未老尙可出紅日已高猶自眠洞號長生宜有主窩名安樂豈無權敢於世上明開眼會向人間别看天盡送光陰歸酒盞都移造化入詩篇也知此片好田地消得堯夫筆似椽謝君實端明惠山蔬八品八品山蔬盡藥萌何山採得各標名山翁驚受霜臺貺卽命山妻親自烹和君實端明洛陽看花洛陽最得中和氣一草一木皆入看飲水也須無限樂况能時復舉杯盤洛陽花木誇天下吾輩遊勝庶士遊重念東君分付意忍於佳處不遲留洛陽交友皆奇傑遞賞名園只似家却笑孟郊窮不慣一日看盡長安花南園一色栽桃李春到且圖花早開多謝主人情意厚天津客不等閑來暮春吟林下居常睡起遲那堪車馬近來稀春深晝永簾垂地庭院無風花自飛安樂窩銘安莫安于王政平樂莫樂于年穀登王政不平年不登窩中何由得康甯思省吟仲尼再思曾子三省予何人哉敢不修整乾坤吟用九見羣龍首能出庶物用六利永貞因乾以爲利四象以九成遂爲三十六四象以六成遂成二十四如何九與六能盡人間事皇極經世一元吟天地如葢軫覆載何高極日月如磨蟻往來無休息上下之𡻕年其數難窺測且以一元言其理尙可識一十有二萬九千餘六百中間三千年迄今之陳迹治亂與廢興著見于方策吾能一貫之皆如身所厯應龍吟龍者陽類與時相須首出庶物同遊六虛能潛能見能吸能呼能大能小能有能無何處是仙鄕何處是仙鄕仙鄕不離房眼前無冗長心下有淸涼靜處乾坤大閑中日月長若能安得分都勝别思量依韻和王安之少卿謝富相公寵辱見多惡足驚出塵還喜自誠明閑中氣象乾坤大靜處光陰宇宙淸素業經綸無少愧全功天地不虛生野人何幸逢昌運一百餘年天下平瓮牖吟瓮破已甘棄言收用有方用時須藉口照處便安牀不假軒窗力能廻日月光淸平卧其下自可比羲皇人生長有兩般愁人生長有兩般愁愁死愁生未易休或向利中窮力取或于名上盡心求多思唯恐晚得手未老已聞先白頭我有何功居彼上其間攘臂獨無憂中秋月一年一度中秋夜十度中秋九度陰求滿直須當夜半要明仍候到天心無雲照處情非淺不睡觀時意更深徒愛古人詩句好何堪千里共如今和李文思早秋五首錄一一雨洗觚稜三川氣象淸林風傳顥氣木葉送商聲忽忽蓮生的看看菊吐英太平時裏老何以報虛生堯夫何所有堯夫何所有一色得天和夏住長生洞冬居安樂窩鸎花供放適風月助吟哦竊料人間樂無如我最多長憶乍能言長憶乍能言朝遊父母前方行初下膝旣老遂華顚在昔四五𡻕于今六十年却看兒女戲又喜又澘然獨坐吟天告自丁甯人多不肯聽四時皆有景萬物豈無情禍福眼前事是非身後名誰能事閑氣浪與世人爭又天意自分明人多不肯行鸎花春乍暖風月雨初晴靜坐澄思慮閑吟樂性情誰能事閑氣浪與世人爭意未萌于心意未萌于心言未出諸口神莫得而窺人莫得而咎君子貴愼獨上不愧屋漏人神亦吾心口自處其後老翁吟皤然一老翁凡百事皆慵舊物不盡記故人難得逢幽花渾在霧殘夢半隨風只且願天下時和與𡻕豐道裝吟道家儀用此衣巾只拜星辰不拜人何故堯夫須用拜安知人不是星辰道家儀用此巾衣師外曾聞更拜誰何故堯夫須用拜安知人不是吾師安車麈尾道衣裝里閈過從乃是常聞說洞天多似此吾鄕殊不異仙鄕如知道只在人心造化工夫自可尋若說衣巾便爲道堯夫何者敢披襟再用晴牕氣暖墨花春謝王勝之諫議惠金雀硯硯名金雀世難倫用報慚無天下珍國士有詩偏雅處晴牕氣暖墨花春題范忠獻公眞范邵居洛陽希夷居華山陳邵爲邑人忠獻爲顯官邵在范之後陳在范之前三人貎相類兩人名相連試筆心在人軀號太陽能於世上發輝光如何皎日照八表得似靈臺高一方家用平康貧不害身無疾病瘦何妨高吟大笑洛城裏看盡人間手脚忙試硯富貴傲人人未信還知富貴去如何常觀靜處光陰好亦恐閑時思慮多日出自然天不暗風來安得水無波世間大有平田地因甚須由㨗徑過問調鼎請將調鼎問于君調鼎功夫敢預聞只有鹽梅難盡善豈無薑桂助爲辛和羹必欲須求美眾口如何便得均愼勿輕言天下事伊周殊不是庸人𡻕儉吟𡻕儉心非儉家貧道不貧誰知天地内别有好乾坤極論下有黃泉上有天人人許住百來年還知虛過死萬遍都似不曾生一般要識明珠須巨海如求良玉必名山先能了盡世間事然後方言出世間求鑑吟人無鑑流水當求鑑止水流水無定形止水有定體人無鑑于水當求鑑于人水鑑見人貎人鑑見人神學佛吟飽食豐衣不易過日長時節奈愁何求名少日投宣聖怕死老年親釋迦妄欲斷緣緣愈重徼求去病病還多長江一片常如練幸自無風又起波性情踐形治性踐跡治情賢人踐跡聖人踐形心跡吟聖人了心賢人了跡了心無窮了跡無極冬不出吟冬非不欲出欲出苦日短年老恐話長天寒怕歸晚山翁頭有風鄕友情非淺必欲相招延春光況不遠觀物地以靜而方天以動而圓旣正方圓體還明動靜權靜久必成潤動極遂成然潤則水體具然則火用全水體以器受火用以薪傳體在天地後用起天地先坐右吟萬化備于身直須資養深因何爲寶鑑只被用精金酒少如茶飲詩多似史吟顏淵方内樂天下事難任六十五𡻕新正自貽熙甯八年予家洛城裏况在天津畔行年六十五當宋之盛旦南園臨通衢北圃仰雙觀雖然在京國却如處山澗淸泉篆溝渠茂木繡霄漢涼風竹下來皓月松間見面前有芝蘭目下無冰炭坐上有餘歡胸中無交戰冬夏旣不出炎涼徒自變榮辱旣不入富貴徒自衒惡聞人之惡樂道人之善不行何趑趄勿藥何瞑眩誰謂金石堅其心亦能斷誰謂鬼神靈其誠亦能貫觀易吟一物其來有一身一身還有一乾坤能知萬物備于我肯把三才別立根天向一中分體用又云造化人於心上起經綸天人焉有兩般義又云事道不虛行只在人觀三皇吟許大乾坤自我宣乾坤之外復何言初分大道非常道纔有先天未後天作法極微難看蹟收功最久不知年若教世上論勳業料得更無人在前觀五帝吟進退肯將天下讓着何言語狀雍容衣裳垂處威儀盛玉帛修時意思恭物物盡能循至理人人自願立殊功當時何故得如此只被聲名類日中喜老吟幾何能得鬢如絲安用區區鑷白髭在世上官雖不做出人間事却能知待天春暖秋涼日是我東遊西泛多少寬平好田地山翁方始會開眉還圓益上人詩卷鉼錫相從更一巾一巾曾拂十州塵心通佛性久無礙口道儒言殊不陳吳越江山前日事伊嵩風月此時身閑行閑坐松陰下應恃眼明長笑人小車初出吟物外洞天三十六都疑布在洛陽中小車春暖秋涼日一日止能移一宫無疾吟無疾之安無災之福舉天下人不爲之足四者吟財色名勢爲世所親四者不動然後見人不同吟求者不得辭者不能二者相去其遠幾程答人吟筋骸得似當年否氣血能如舊日無却喜一般增長處罇前談笑有工夫𡻕寒吟松柏入冬看方能見𡻕寒聲須風裏聽色更雪中觀觀物吟耳目聰明男子身洪鈞賦與不爲貧因探月窟方知物未躡天根豈識人乾遇巽時觀月窟地逢雷處看天根天根月窟閑來往三十六宫都是春秋懷吟一番春了未多時雲外征鴻又報歸節物眼前來若此𡻕華頭上去如斯當年志意雖然在今日筋骸甯不衰賴有寸心常自喜聖人難處却能知𡻕暮自貽吟天道無長春地道無常珍須禀中和氣方生粹美人良田多黍稌薄地足荆榛樗櫟蓬蒿類正能充惡薪君子飲酒吟父慈子孝兄友弟恭家給人足時和𡻕豐筋骸康健里閈過從君子飮酒其樂無窮讀張子房傳吟漢室開基第一功善哉能始亦能終直疑後日赤松子便是當年黃石公用捨隨時無分限行藏在我有窮通古人已死不復見痛惜今人少此風治亂吟五首錄二中原一片閑田地曾生三皇與五帝三皇五帝子孫多或賤或貧或富貴精義入神以致用利用出入之謂神神無方而易無體藏諸用而顯諸仁觀事吟一𡻕之事勤在春一日之事勤在晨一生之事勤在少一端之事勤在新金玉吟聖在人中出心從行上修金於沙裏得玉向石中求上下吟自下觀上無限富貴自上觀下無限賤貧自心觀物何物能一自物觀心何心不均不再吟春無再至花無再開人無再少時無再來毛頭吟憂國心深爲愛君愛君須更重於身口中講得未必是手裏做成方始眞妄意動時難照物俗情私處莫知人厚誣天下凶之甚多少英才在下塵六得吟眼能識得耳能聽得口能道得手能做得身能行得心能放得六者盡與天地同德飲食起居出處語默不止省心又更省力無妄吟耳無妄聽目無妄顧口無妄言心無妄慮四者不妄聖賢之具予何人哉敢不希慕宇宙吟宇宙在乎手萬物在乎身緜緜而若存用之豈有勤久旱吟久旱望雨久雨思晴天之常道人之常情成性吟成性存存用志不分又何患乎不到古人先天吟示邢和叔一片先天號太虛當其無事見眞腴胸中美物肯自衒天下英才致厚誣理順是言皆可放義安何地不能居直從宇泰收功後始信人間有丈夫浩歌吟何者謂知機惟神能造微行藏全在我用捨繫於時每恨知人晚常憂見事遲與天爲一體然後識宣尼利名吟利名都不到胸中由此胸中氣自沖旣愛且憎皆是病靈臺何日得從容凭高吟誰將酷烈千般毒變作恩光一派深惆悵先民不復見更凭高處儘沈吟君子吟君子與義小人與利與義日興與利日廢君子尙德小人尙力尙德樹恩尙力樹敵君子作福小人作威作福福至作威禍隨君子樂善小人樂惡樂惡惡至樂善善歸君子好譽小人好毁好毁人怒好譽人喜君子思興小人思壞思興召祥思壞召怪君子好與小人好求好與多喜好求多憂君子好生小人好殺好生道行好殺道絕爽口吟爽口之物少茹爽心之行少慮爽意之言少語爽身之事少做至誠吟不多求故得不離學故明欲得心常明無過用至誠詩酒吟聖人難處口能宣何止千年與萬年心靜始能知白日眼明方會看靑天鬼神情狀將詩寫造化工夫用酒傳傳寫不干詩酒事若無詩酒又難言知音吟仲尼始可言無意孟子方能不動心莫向山中尋白玉但於身上覔黃金山中白玉有時得身上黃金無處尋我輩何人敢稱會安知世上無知音觀物吟一氣纔分兩儀已備圓者爲天方者爲地變化生成動植類起人在其間最靈最貴感事吟五首錄三萬物有精英人爲萬物靈必先詳事體然後論人情氣靜形安樂心閒身太平伊耆治天下不出此名生用藥似交兵兵交豈有甯求安安未得去病病還生湯劑未全補甘肥又却爭何由能夀考瑞應老人星前有億萬年後有億萬世中間有夀人未過百來𡻕出口無善言行身無善事徒有人之身殊無人之貴見義吟見善必爲不見則已量力而動力盡而止觀物吟畫工狀物經月經年軒鑑照物立寫于前鑑之爲明猶或未精工出人手平與不平天下之平莫若于水止能照表不能照裏表裏洞照其唯聖人察言觀行罔或不眞盡物之性去已之情有德之人而必有言能言之人未必能行能寐吟大驚不寐大憂不寐大傷不寐大病不寐大喜不寐大安能寐何故不寐溺於有累何故能寐行於無事先天吟若聞先天一字無後天方要著工夫拔山蓋世稱才力到此分毫强得無自樂吟麟鳳何嘗不在郊太平消得苦譊譊纔聞善事心先喜每見奇書手自抄一瓦淸泉來竹下兩竿紅日上松梢窩中睡起窩前坐安得閒辭解客嘲代書吟金須百鍊始知精水鑑何如人鑑明不棄旣能存故舊久要焉敢忘平生經綸事體當言用道義襟懷只論誠草木面前何止萬𡻕寒松桂獨靑靑萬物吟萬物備于身乾坤不負人時光嗟荏苒事體落因循旣感靑春老還驚白髮新胸中若無有未免作埃塵月窟吟月窟與天根中間來往頻所居皆綽綽何往不申申投足自有定滿懷都是春若無詩與酒又似太虧人大象吟大象自中虛中虛眞不渝施爲心事應對口工夫侮量千般有憂愁一點無人能知此理勝讀五車書百病吟百病起於情情輕病亦輕可能無系累却是有依憑秋月千山靜春華萬木榮若論眞事業人力莫經營留題水北楊郎中園亭二首買宅從來重見山見山今值幾何錢奇峰環列遠隔水喬木俯臨微帶煙行路客疑經洞府凭欄人恐是神仙長憂暗入丹靑手寫向鮫綃天下傳洛下誰家不買居買居還得似君無風光一片非塵世景物四時眞畫圖後圃花奇眞閬苑前軒峰好類蓬壺人生能向此中老亦是世間豪丈夫不肖吟不肖之人志在遊蕩身在屋下心在屋上不肖之子志在浮誇身尙不保焉能保家大易吟天地定位否泰反類山澤通氣損咸見義雷風相薄恒益起意水火相射旣濟未濟四象相交成十六事八卦相盪爲六十四罷吟吟久欲罷吟詩還驚意忽奇坐中知物體言外到天機得句不勝易成篇豈忍遺安知千萬載後世無宣尼黃金吟身上有黃金人無走陸沈求時未必見得處不因尋辯㨗非通物涵容是了心會彈無絃琴然後能知音團團吟如鑑又如鈎回旋莫記秋難窮天上理易白世間頭團處人人喜虧時物物愁有生無不喘何必待吳牛觀棊絕句未去交爭意難忘黑白心一條無敵路徹了沒人尋未去交爭意難忘黑白情一條平穩路痛惜沒人行誡子吟至寶明珠非有纇全珍良玉自無瑕爲珠爲玉尙如此何況爲人多過差道不遠于人乾坤只在身誰能天地外别去覔乾坤冬至吟何者謂之幾天根理極微今年初盡處明日未來時此際易得意其間難下辭人能知此意何事不能知歡喜吟揚善不揚惡記恩不記讐人人自歡喜何患少交遊推誠吟天雖不語人能語心可欺時天可欺天人相去不相遠只在人心人不知人心先天天弗違人身後天奉天時身心相去不相遠只在人誠人不推堯夫吟堯夫吟天下拙來無時去無節如山川行不徹如江河流不竭如芝蘭香不歇如簫韶聲不絕也有花也有雪也有風也有月又温柔又峻烈又風流又激切天人吟天學修心人學修身身安心樂乃見天人天之與人相去不遠不知者多知之者鮮身主于人心主于天心旣不樂身何由安十分吟所謂十分人須有十分眞非謂能寫字非謂能爲文非謂眉目秀非謂衣裳新欲行人世上直須先了身所謂十分人須有十分事事苟不十分終是未完備事父盡其心事兄盡其意事君盡其忠事師盡其義人夀百來年其過豈容易雖然瞬息間其間多少事號爲能了事必先能了身身苟未能了何暇能了人生日吟祥符辛亥十二月二十五日辛亥年辛丑月甲子日甲戌辰日辰同甲年月同辛吾于此際生而爲人𡻕暮吟世上紛華都不見眼前唯見讀書尊百千難過尙驚愓三十𡻕前尤苦辛少日只知難險事老年方識太平身家風幸有兒孫繼足以無心伴白雲春天吟一片春天在眼前眼前須識好春天春秋冬夏能無累雪月風花都一連能用眞腴爲事業豈防他物害暄妍我生其幸何多也安有閒愁到耳邊多事吟多事招憂多疑招悶多與招吝多取招損觀物吟居暗觀明居靜觀動居𥳑觀繁居輕觀重所居者寡所觀則眾匪居匪觀眾寡何用答和吳傳正贊善二首并寄高陽王十三機宜洛陽城裏一愚夫十許年來不讀書老去情懷難狀處淡煙寒月映松疎樂靜豈無病好閒終有心爭如自得者與世善浮沈是非吟是短非長好丹非素一生區區未免愛惡愛惡不去何由是非愛惡旣去是非何爲洗心吟人多求洗身殊不求洗心洗身去塵垢洗心去邪滛塵垢用水洗邪淫非能淋必欲去心垢須彈無絃琴寛猛吟寛則民慢猛則民殘寛猛相濟其民自安小道吟藝雖小道事亦繫人苟不造微焉能入神得失吟人有賢愚事無巨細得不艱難失必容易安分吟輕得易失多謀少成德無盡利善無近名好勝吟人無好勝事無過求好勝多辱過求多憂憂辱並至道德弗遊不止人患身亦是仇治心吟心親于身身親于人不能治心焉能治身不能治身焉能治人吾廬吟吾亦愛吾廬吾廬似野居性隨天共淡身與世俱疎遍地長芳草滿牀堆亂書自從無事後更不著工夫内外吟目耳鼻口人之戸牖心膽脾腎人之中霤内若能守外自不受内若無守外何能久疑信吟人無輕信事無多疑輕信招釁多疑招離冬至吟冬至子之半天心無攺移一陽初起處萬物未生時元酒味方淡大音聲正希此言如不信更請問庖犧繩水吟水能平而不能直繩能直而不能平安得繩水爲人情而使天下都無爭内外吟衣冠整整謂之外修行義純潔謂之内修内外俱修何人不求喜飲吟堯夫喜飮酒飮酒喜全眞不喜成酩酊只喜成微醺微醺景何似襟懷如初春初春景何似天地纔絪緼不知身是人不知人是身只知身與人與人都未分行止吟時止則須止時行則可行時行與時止人力莫經營太平吟太平時世園亭内豐稔𡻕年村落間情味一般難狀處風煙草木盡閒閒不出吟冬夏遠難出止行南北園如逢好風景亦可至三天西行至天街二百步北行至天津三百步東行至天宫四百步不同吟君子之人與已非比聞善則樂見賢則喜小人之人與巳非惡聞善則憎見賢則怒影論吟性在體内影在形外性往體隨形行影會體性不存形影安在影外之言曾何足怪窺開吟物理窺開後人情照破時一身都是我瘦了又還肥物理窺開後人情照破時能將函谷塞只用一丸泥物理窺開後人情照破時渴多逢美酒病後遇良醫物理窺開後人情照破時情中明事體理外見天機物理窺開後人情照破時可嗟兼可唾堪鄙又堪嗤措處吟在未定之時當難處之地方事之危疑見人之措置幽明吟明有日月幽有鬼神日月照物鬼神依人明由物顯幽由人陳人物不作幽明何分自餘吟身生天地後心在天地前天地自我出自餘何足言四不可吟言不可妄行不可隳命不可忽天不可違覽照其骨爽其神淸其祿薄其福輕一等吟欲出第一等言須有第一等意欲爲第一等人須作第一等事洛陽春吟四方景好無如洛一𡻕花奇莫若春景好花奇精妙處又能分付與閒人自貽吟六十有七𡻕生爲世上人四方中正地萬物備全身天外更無樂胸中别有春泉布吟名爲泉布者無足走人間善發難言口能開不笑顔償逋小續命賙急大還丹唯有商山老非干買得閒自處吟堯夫自處道如何滿洛陽城都似家不德於人焉敢異至誠從物更無他眼前只見羅天爵頭上誰知換𡻕華何止春歸與春在胸中長有四時花爲人吟爲人須是與人羣不與人羣不盡人大舜與人焉有異帝堯親族亦推倫人心齟齬一身病事體和諧四海春心在四支心是主四支連復遠于身先天吟先天事業有誰爲爲者如何告者誰若謂先天言可告君臣父子外何歸眼前伎倆人皆曉心上工夫世莫知天地與身皆易地已身殊不異庖犧年老吟𡻕華頭上不能驚唯有交親眼更明皓皓月臨因坐看深深酒不爲愁傾苟於心上無先覺却似人間小後生欲約何人爲伴侣江湖泛去一舟輕天地吟天人之際豈容鍼至理何煩遠去尋凶熖熾時焚更烈恩波流處浸還深長征戍卒思歸意久旱蒼生望雨心禍福轉來如反掌可能中夜不沈吟人玉吟玉不自珍人與珍人珍何謝玉之純然如粹美始終一更看淸光表裏眞韜韞有名初在石琢磨成器𨚫須人古人巳死不復見被褐之言不謬去樂物吟物有聲色氣味人有耳目口鼻萬物于人一身反觀莫不全備野軒一軒名野非塵境嵩少煙岑送好風日月𡻕時都屬巳更於何處覔壺中汙亭許由爲計未爲深洗耳何如不動心到此灑然如世外何嘗更有事來侵晝睡晝睡工夫未易偕羲皇以上合安排心間無事飽食後園裏有時閒步回未午庭柯鸎屢囀已殘花徑客稀來請觀世上多愁者枕簟雖涼無此懷進退吟進退兩途皆曰賓何煩坐上苦云云低眉坐處當周物掉臂行時莫顧人齒髮旣衰非少日林泉能老是長春行於無事人知否寵辱何由得到身攝生吟握固如嬰兒作氣如壯士二者非自然皆出不容易心爲身之主志者氣之帥沈珠于深淵養自已天地重病吟安樂五十年一旦感重疾仍在盛夏中伏枕幾百日砭灸與藥餌百療効無一以命聽于天于心何所失天人吟天生此身人力寄人力盡兮天數至天人相去不毫芒若有毫芒𨚫成二聽天吟上天生我上天死我一聽于天有何不可得一吟天自得一天無旣我一自天而後至唯天與一無兩般我亦何嘗與天異
